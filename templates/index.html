<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteLab — многокритериальная маршрутизация</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>RouteLab</h1>
            <p class="subtitle">Парето-оптимальные маршруты</p>

            <div class="form-group">
                <label>Откуда:</label>
                <select id="fromSelect"></select>
            </div>

            <div class="form-group">
                <label>Куда:</label>
                <select id="toSelect"></select>
            </div>

            <div class="form-group">
                <label>Приоритеты (веса):</label>
                <div class="weights">
                    <label>Время: <input type="range" id="weightTime" min="0" max="1" step="0.05" value="0.5"></label>
                    <span id="timeVal">0.50</span>
                </div>
                <div class="weights">
                    <label>Стоимость: <input type="range" id="weightCost" min="0" max="1" step="0.05" value="0.3"></label>
                    <span id="costVal">0.30</span>
                </div>
                <div class="weights">
                    <label>Комфорт: <input type="range" id="weightComfort" min="0" max="1" step="0.05" value="0.2"></label>
                    <span id="comfortVal">0.20</span>
                </div>
            </div>

            <button id="searchBtn" class="btn" onclick="searchRoutes()">Найти маршруты</button>
            <button id="addStopBtn" class="btn" style="background:#e67e22; margin-top:0;" onclick="window.startAddStopMode()">➕ Добавить остановку</button>
            <button id="addEdgeBtn" class="btn" style="background:#27ae60;" onclick="window.startAddEdgeMode()">➕ Добавить ребро</button>
            <button id="pointToPointBtn" class="btn" style="background:#9b59b6;" onclick="window.startPointToPointMode()">📍 Точка → Точка</button>
            <button id="addPointBtn" class="btn" style="background:#f39c12;" onclick="window.startAddPointMode()">📍 Добавить точку</button>
            <button id="clearRouteBtn" class="btn" style="background:#95a5a6; margin-top:5px;" onclick="window.clearStartEndMarkers(); if(typeof drawRoutesWithOSRM === 'function') drawRoutesWithOSRM([], 0);">🗑 Сбросить маршрут</button>

            <div class="saved-points" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px;">
                <h4 style="margin: 0 0 8px 0;">📌 Сохранённые точки</h4>
                <div id="savedPointsList" style="font-size: 13px; max-height: 150px; overflow-y: auto;">
                    Пусто
                </div>
            </div>

            <div class="history" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px;">
                <h4 style="margin: 0 0 8px 0;">📜 История маршрутов</h4>
                <div id="historyList" style="font-size: 12px; max-height: 150px; overflow-y: auto;">
                    Пусто
                </div>
            </div>

            <div class="results" id="results">
                <h3>Маршруты</h3>
                <div id="routesList"></div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='core/state.js') }}"></script>
    <script src="{{ url_for('static', filename='map/map.js') }}"></script>

    <script src="{{ url_for('static', filename='core/api.js') }}"></script>
    <script src="{{ url_for('static', filename='core/app.js') }}"></script>

    <script src="{{ url_for('static', filename='editor/editor.js') }}"></script>
    <script src="{{ url_for('static', filename='editor/placeEditor.js') }}"></script>

    <script src="{{ url_for('static', filename='map/markers.js') }}"></script>
    <script src="{{ url_for('static', filename='map/edges.js') }}"></script>
    <script src="{{ url_for('static', filename='map/routes.js') }}"></script>
    <script src="{{ url_for('static', filename='map/points.js') }}"></script>

    <script src="{{ url_for('static', filename='ui/ui.js') }}"></script>
</body>
</html>
